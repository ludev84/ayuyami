<!DOCTYPE html>
<html lang="en">

<head>
  <base href="ayuyami/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preload" as="image" href="assets/logo.webp" fetchpriority="high">
  <link rel="icon" type="image/x-icon" href="assets/icon-ayu-yami.webp">
  <title>Taiyaki Ayu-Yami</title>

  <link rel="preconnect" href="https://fonts.cdnfonts.com/">
  <link rel="preconnect" href="https://fonts.cdnfonts.com/" crossorigin>
  <link href="assets/fonts/OpenSans-Regular.woff2" type="font/woff2"
    rel="preload" as="font" crossorigin>
  <link rel="stylesheet" href="css/normalize.min.css" />
  <link rel="stylesheet" href="css/style.css">

  <script src="js/header.js" defer></script>
  <script src="js/banner.js" defer></script>
  <script src="js/footer.js" defer></script>
</head>

<body>

  <header-component></header-component>
  
  <main>
    <div class="container py-3">
      <banner-component
        data-bg-color="#8cb3ee"
        data-flip-char="!"
        data-text1="Bienvenido a"
        data-text2="Taiyaki Ayu-Yami!">
      </banner-component>
      <div class="cards-grid">
        <div class="card">
          <a href="sucursales/"><img src="assets/thumbnail-maps.png" alt="thumbnail-maps" loading="lazy" decoding="async"></a>
          <div class="card-body">
            <h5 class="card-title">Visítanos</h5>
            <p class="card-text">¡Ven a visitarnos a nuestas sucursales!</p>
            <a href="sucursales/" class="btn btn-primary">Visitar</a>
          </div>
        </div>

        <div class="card">
          <a href="conocenos/"><img src="assets/thumbnail-about.webp" alt="thumbnail-historietas" loading="lazy" decoding="async"></a>
          <div class="card-body">
            <h5 class="card-title">Conócenos</h5>
            <p class="card-text">¡Descubre más sobre nosotros aquí!</p>
            <a href="conocenos/" class="btn btn-primary">Ver</a>
          </div>
        </div>

        <div class="card">
          <a href="comics/"><img src="assets/thumbnail-comics.webp" alt="thumbnail-historietas" loading="lazy" decoding="async"></a>
          <div class="card-body">
            <h5 class="card-title">Historietas</h5>
            <p class="card-text">¡Aventúrate con nosotras, listas para la diversión! Capítulos nuevos próximamente :3</p>
            <a href="comics/" class="btn btn-primary">Ver historietas</a>
          </div>
        </div>

        <div class="card">
          <a href="menu/"><img src="assets/thumbnail-menu.webp" alt="thumbnail-menu" loading="lazy" decoding="async"></a>
          <div class="card-body">
            <h5 class="card-title">Menú</h5>
            <p class="card-text">Revisa todo nuestro menú aquí &#129505;</p>
            <a href="menu/" class="btn btn-primary">Ver menú</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer-component></footer-component>

</body>

</html>
